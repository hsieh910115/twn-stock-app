services:
  - type: web
    name: twn-stock-app
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_CACHE_TTL_SECONDS
        value: "900"
      - key: FINMIND_TOKEN
        sync: false
