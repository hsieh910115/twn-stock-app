name: Update AI Stock Screener

on:
  schedule:
    # 台灣時間 17:00 = UTC 09:00
    - cron: "0 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-ai-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance requests urllib3 lxml html5lib beautifulsoup4

      - name: Run AI screener
        run: |
          python scripts/run_ai_screener.py

      - name: Commit updated CSV
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/ai_momentum_top.csv
          git commit -m "Update AI momentum screener data" || echo "No changes to commit"
          git push
